services:
  db:
    image: postgres:16-alpine
    container_name: docvault-db
    environment:
      POSTGRES_USER: docvault
      POSTGRES_PASSWORD: docvault_secret
      POSTGRES_DB: docvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docvault -d docvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docvault-backend
    environment:
      DATABASE_URL: postgresql+psycopg://docvault:docvault_secret@db:5432/docvault
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docvault-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
